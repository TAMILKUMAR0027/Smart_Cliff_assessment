<!DOCTYPE html>
<html>
    <head>
        <title>Student Registration</title>
        <link rel="stylesheet" href="style.css">
        <script src="validate.js"></script>
    </head>
    
    <body>
        <form id="regform">
        <h1>Student Registration form</h1>
        <p>Students can register the details by entering their details</p>
       <label>Full Name:</label>
       <input type="text" id="name">
       <label>Email :</label>
       <input type="text" id="email">
       <label>Date of birth</label>
       <input type="date" id="date">
       <label>Gender</label>
       <input type="radio" name="gender">Male
       <input type="radio" name="gender">Female
       <input type="radio" name="gender">other
       <label>Languages Known</label>
       <input type="checkbox">Tamil
       <input type="checkbox">English
       <input type="checkbox">Japaneese
       <label>Course</label>
       <select id="course">
        <option value="">Select the couse</option>
        <option>B.E</option>
        <option>M.E</option>
        <option>MBA</option>
        <option>MCA</option>
       </select>
       <label>Submit</label>
       <button type="submit">Submit</button>
       </form>
       <h2>Campus facilties</h2>
       <ul>
        <li>Library</li>
        <li>Food court</li>
        <li>Classess</li>
        <li>Hostel</li>
        <li>Acdemy performance</li>
        <li>Sports</li>
        <li>Events</li>
        <li>faculties</li>
       </ul>
       <footer>Tamil Kumar 2026</footer>
    </body>
</html>
